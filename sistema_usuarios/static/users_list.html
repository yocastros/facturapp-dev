<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Usuarios - Sistema HORECA</title>
    <link rel="stylesheet" href="/static/sistema_usuarios_shared.css">
</head>
<body>
    <nav class="navbar">
      <div class="navbar-brand">
        <h1>Gestión Facturas</h1>
        <span>& Albaranes</span>
      </div>
      <div class="navbar-links">
        <a href="/dashboard">Dashboard</a>
        <button id="nav-users" class="hidden" onclick="window.location.href='/users'">Usuarios</button>
        <a href="/profile">Mi perfil</a>
        <button onclick="localStorage.removeItem('token'); window.location.href='/login'">Salir</button>
      </div>
    </nav>

    <div class="container">
        <div id="alert-success" class="alert alert-success"></div>
        <div id="alert-error" class="alert alert-error"></div>
        <div id="alert-warning" class="alert alert-warning"></div>

        <div id="access-denied" class="access-denied" style="display: none;">
            <h2>⛔ Acceso Denegado</h2>
            <p>No tienes permiso para acceder a esta página.</p>
            <button onclick="window.location.href='/dashboard'" class="btn" style="margin-top: 20px;">Volver al Dashboard</button>
        </div>

        <div id="content">
            <div class="header-actions">
                <h2>👥 Gestión de Usuarios</h2>
                <button onclick="window.location.href='/create-user'" class="btn btn-success">➕ Nuevo Usuario</button>
            </div>

            <div class="card">
                <div id="loading" class="loading">Cargando usuarios...</div>
                <div id="users-table-container" style="display: none;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Email</th>
                                <th>Nombre Completo</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                        </tbody>
                    </table>
                </div>
                <div id="empty-state" class="empty-state" style="display: none;">
                    <h3>No hay usuarios</h3>
                    <p>Aún no se han creado usuarios en el sistema.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = '/login';
        }

        let currentUserId = null;
        let userRole = null;

        async function checkRole() {
            try {
                const response = await fetch('/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const user = await response.json();
                    currentUserId = user.id;
                    userRole = user.role;
                    localStorage.setItem('user_id', user.id);
                    localStorage.setItem('role', user.role);

                    if (user.role === 'admin') {
                        document.getElementById('nav-users').classList.remove('hidden');
                    }

                    if (user.role !== 'admin') {
                        document.getElementById('content').style.display = 'none';
                        document.getElementById('access-denied').style.display = 'block';
                        return false;
                    }

                    return true;
                } else {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                    return false;
                }
            } catch (error) {
                console.error('Error:', error);
                return false;
            }
        }

        async function loadUsers() {
            const loadingDiv = document.getElementById('loading');
            const tableContainer = document.getElementById('users-table-container');
            const emptyState = document.getElementById('empty-state');
            const tableBody = document.getElementById('users-table-body');

            try {
                const response = await fetch('/api/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const users = await response.json();

                    loadingDiv.style.display = 'none';

                    if (users.length === 0) {
                        emptyState.style.display = 'block';
                        return;
                    }

                    tableContainer.style.display = 'block';

                    tableBody.innerHTML = users.map(user => {
                        const isCurrentUser = user.id === currentUserId;
                        return `
                        <tr>
                            <td>${user.id}</td>
                            <td>${user.username}</td>
                            <td>${user.email}</td>
                            <td>${user.full_name || '-'}</td>
                            <td><span class="role-badge role-${user.role}">${getRoleName(user.role)}</span></td>
                            <td class="${user.is_active ? 'status-active' : 'status-inactive'}">
                                ${user.is_active ? '✅ Activo' : '❌ Inactivo'}
                            </td>
                            <td class="actions">
                                <button class="btn btn-warning" onclick="editUser(${user.id})">✏️ Editar</button>
                                <button class="btn btn-danger" onclick="deleteUser(${user.id}, '${user.username}', ${isCurrentUser})">🗑️ Eliminar</button>
                            </td>
                        </tr>
                    `}).join('');
                } else if (response.status === 403) {
                    loadingDiv.textContent = 'No tienes permiso para ver esta información';
                } else {
                    loadingDiv.textContent = 'Error al cargar usuarios';
                }
            } catch (error) {
                loadingDiv.textContent = 'Error de conexión';
            }
        }

        function getRoleName(role) {
            const roles = { 'admin': 'Administrador', 'advanced': 'Avanzado', 'basic': 'Básico' };
            return roles[role] || role;
        }

        function editUser(userId) {
            window.location.href = `/edit-user?id=${userId}`;
        }

        async function deleteUser(userId, username, isCurrentUser) {
            const successDiv = document.getElementById('alert-success');
            const errorDiv = document.getElementById('alert-error');
            const warningDiv = document.getElementById('alert-warning');

            successDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            warningDiv.style.display = 'none';

            if (isCurrentUser) {
                warningDiv.textContent = '⚠️ No puedes eliminar tu propio usuario';
                warningDiv.style.display = 'block';
                return;
            }

            if (!confirm(`¿Estás seguro de eliminar al usuario "${username}"?`)) return;

            try {
                const response = await fetch(`/api/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    successDiv.textContent = `Usuario "${username}" eliminado correctamente`;
                    successDiv.style.display = 'block';
                    loadUsers();
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.detail || 'Error al eliminar usuario';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.style.display = 'block';
            }
        }

        async function init() {
            const isAdmin = await checkRole();
            if (isAdmin) await loadUsers();
        }

        init();
    </script>
</body>
</html>
