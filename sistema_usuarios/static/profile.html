<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Sistema HORECA</title>
    <link rel="stylesheet" href="/static/sistema_usuarios_shared.css">
</head>
<body>
    <nav class="navbar">
      <div class="navbar-brand">
        <h1>Gestión Facturas</h1>
        <span>& Albaranes</span>
      </div>
      <div class="navbar-links">
        <a href="/dashboard">Dashboard</a>
        <button id="nav-users" class="hidden" onclick="window.location.href='/users'">Usuarios</button>
        <a href="/profile">Mi perfil</a>
        <button onclick="localStorage.removeItem('token'); window.location.href='/login'">Salir</button>
      </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>👤 Mi Perfil</h2>

            <div id="loading" class="loading">Cargando perfil...</div>

            <div id="form-container" style="display: none;">
                <div class="user-info-card">
                    <div class="user-avatar-lg" id="user-avatar-initials"></div>
                    <div>
                        <div class="user-info-name"><span id="user-username"></span></div>
                        <div class="user-info-email">
                            <span id="user-role" class="role-badge"></span>
                            &nbsp;·&nbsp; Miembro desde <span id="user-created"></span>
                        </div>
                    </div>
                </div>

                <div id="alert-success" class="alert alert-success"></div>
                <div id="alert-error" class="alert alert-error"></div>

                <form id="profileForm">
                    <div class="section-title">Información Personal</div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email *</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="full_name">Nombre Completo</label>
                        <input type="text" class="form-control" id="full_name" name="full_name">
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Guardar Cambios</button>
                </form>

                <!-- Solo visible para usuarios NO admin -->
                <form id="passwordForm" class="hidden" style="margin-top: 30px;">
                    <div class="section-title">Cambiar Contraseña</div>

                    <div class="form-group">
                        <label class="form-label" for="current_password">Contraseña Actual *</label>
                        <input type="password" class="form-control" id="current_password" name="current_password" placeholder="Tu contraseña actual">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="new_password">Nueva Contraseña *</label>
                        <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Mínimo 6 caracteres">
                        <div class="form-hint">Mínimo 6 caracteres.</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirm_password">Confirmar Nueva Contraseña *</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Repite la nueva contraseña">
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Cambiar Contraseña</button>
                </form>

                <button type="button" onclick="window.location.href='/dashboard'" class="btn btn-outline btn-full" style="margin-top: 16px;">Volver al Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login';

        let isAdmin = false;

        async function loadProfile() {
            const loadingDiv = document.getElementById('loading');
            const formContainer = document.getElementById('form-container');

            try {
                const response = await fetch('/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const user = await response.json();

                    document.getElementById('user-username').textContent = user.full_name || user.username;

                    const initials = (user.full_name || user.username).slice(0, 2).toUpperCase();
                    document.getElementById('user-avatar-initials').textContent = initials;

                    document.getElementById('user-created').textContent = new Date(user.created_at).toLocaleDateString('es-ES');

                    const roleBadge = document.getElementById('user-role');
                    roleBadge.textContent = user.role.toUpperCase();
                    roleBadge.className = `role-badge role-${user.role}`;

                    document.getElementById('email').value = user.email;
                    document.getElementById('full_name').value = user.full_name || '';

                    isAdmin = user.role === 'admin';

                    if (isAdmin) {
                        document.getElementById('nav-users').classList.remove('hidden');
                    } else {
                        document.getElementById('passwordForm').classList.remove('hidden');
                    }

                    localStorage.setItem('user_id', user.id);
                    localStorage.setItem('role', user.role);

                    loadingDiv.style.display = 'none';
                    formContainer.style.display = 'block';
                } else {
                    loadingDiv.textContent = 'Error al cargar perfil';
                }
            } catch (error) {
                loadingDiv.textContent = 'Error de conexión';
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const full_name = document.getElementById('full_name').value;
            const successDiv = document.getElementById('alert-success');
            const errorDiv = document.getElementById('alert-error');
            const userId = localStorage.getItem('user_id');

            successDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch(`/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ email, full_name })
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = 'Perfil actualizado correctamente';
                    successDiv.style.display = 'block';
                } else {
                    errorDiv.textContent = data.detail || 'Error al actualizar perfil';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.style.display = 'block';
            }
        });

        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (isAdmin) {
                const errorDiv = document.getElementById('alert-error');
                errorDiv.textContent = 'Los administradores deben cambiar contraseñas desde Gestionar Usuarios';
                errorDiv.style.display = 'block';
                return;
            }

            const current_password = document.getElementById('current_password').value;
            const new_password = document.getElementById('new_password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const successDiv = document.getElementById('alert-success');
            const errorDiv = document.getElementById('alert-error');
            const userId = localStorage.getItem('user_id');
            const username = document.getElementById('user-username').textContent;

            successDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            if (!current_password) {
                errorDiv.textContent = 'Debes ingresar tu contraseña actual';
                errorDiv.style.display = 'block';
                return;
            }

            if (new_password.length < 6) {
                errorDiv.textContent = 'La nueva contraseña debe tener al menos 6 caracteres';
                errorDiv.style.display = 'block';
                return;
            }

            if (new_password !== confirm_password) {
                errorDiv.textContent = 'Las contraseñas nuevas no coinciden';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const verifyResponse = await fetch('/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(current_password)}`
                });

                if (!verifyResponse.ok) {
                    errorDiv.textContent = 'La contraseña actual es incorrecta';
                    errorDiv.style.display = 'block';
                    return;
                }

                const response = await fetch(`/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ password: new_password })
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = 'Contraseña cambiada correctamente';
                    successDiv.style.display = 'block';
                    document.getElementById('current_password').value = '';
                    document.getElementById('new_password').value = '';
                    document.getElementById('confirm_password').value = '';
                } else {
                    errorDiv.textContent = data.detail || 'Error al cambiar contraseña';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.style.display = 'block';
            }
        });

        loadProfile();
    </script>
</body>
</html>
