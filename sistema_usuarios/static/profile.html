<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil — Gestión Facturas y Albaranes</title>
    <link rel="stylesheet" href="/static/sistema_usuarios_shared.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <h1>Gestión Facturas</h1>
    <span>& Albaranes</span>
  </div>
  <div class="navbar-links">
    <a href="/dashboard">Dashboard</a>
    <button type="button" id="nav-users" class="hidden" onclick="window.location.href='/users'">Usuarios</button>
    <a href="/profile">Mi perfil</a>
    <button type="button" onclick="localStorage.removeItem('token'); window.location.href='/login'">Salir</button>
  </div>
</nav>

<div class="page-wrapper">

    <div class="page-header">
        <div>
            <h2>Mi Perfil</h2>
            <p>Gestiona tu información personal y contraseña</p>
        </div>
        <button type="button" onclick="window.location.href='/dashboard'" class="btn btn-outline">← Dashboard</button>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">Datos de la cuenta</span>
        </div>

        <div id="loading" style="padding:40px; text-align:center; color:var(--gris-m);">
            <div class="spinner"></div>
            <div style="margin-top:12px; font-size:13px;">Cargando perfil...</div>
        </div>

        <div id="form-container" style="display:none; padding:24px;">
            <div class="user-info-card">
                <div class="user-avatar-lg" id="user-avatar-initials"></div>
                <div>
                    <div class="user-info-name"><span id="user-username"></span></div>
                    <div class="user-info-email">
                        <span id="user-role" class="role-badge"></span>
                        &nbsp;·&nbsp; Miembro desde <span id="user-created"></span>
                    </div>
                </div>
            </div>

            <form id="profileForm">
                <div class="section-title">Información Personal</div>

                <div class="form-group">
                    <label class="form-label" for="email">Email *</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="full_name">Nombre Completo</label>
                    <input type="text" class="form-control" id="full_name" name="full_name">
                </div>

                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </form>

            <!-- Solo visible para usuarios NO admin -->
            <form id="passwordForm" class="hidden" style="margin-top:30px;">
                <div class="section-title">Cambiar Contraseña</div>

                <div class="form-group">
                    <label class="form-label" for="current_password">Contraseña Actual *</label>
                    <input type="password" class="form-control" id="current_password" name="current_password" placeholder="Tu contraseña actual">
                </div>

                <div class="form-group">
                    <label class="form-label" for="new_password">Nueva Contraseña *</label>
                    <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Mínimo 6 caracteres">
                    <div class="form-hint">Mínimo 6 caracteres.</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirmar Nueva Contraseña *</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Repite la nueva contraseña">
                </div>

                <button type="submit" class="btn btn-primary">Cambiar Contraseña</button>
            </form>
        </div>
    </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    let isAdmin = false;

    function toast(msg, tipo = 'info') {
        const c = document.getElementById('toasts');
        const t = document.createElement('div');
        t.className = `toast toast-${tipo}`;
        t.innerHTML = `<span>${tipo==='success'?'✓':tipo==='error'?'✗':'ℹ'}</span><span>${msg}</span>`;
        c.appendChild(t);
        setTimeout(() => { t.style.animation='fadeOut .3s ease forwards'; setTimeout(()=>t.remove(),300); }, 4000);
    }

    async function loadProfile() {
        const loadingDiv = document.getElementById('loading');
        const formContainer = document.getElementById('form-container');

        try {
            const response = await fetch('/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                const user = await response.json();

                document.getElementById('user-username').textContent = user.full_name || user.username;

                const initials = (user.full_name || user.username).slice(0, 2).toUpperCase();
                document.getElementById('user-avatar-initials').textContent = initials;

                document.getElementById('user-created').textContent = new Date(user.created_at).toLocaleDateString('es-ES');

                const roleBadge = document.getElementById('user-role');
                roleBadge.textContent = user.role.toUpperCase();
                roleBadge.className = `role-badge role-${user.role}`;

                document.getElementById('email').value = user.email;
                document.getElementById('full_name').value = user.full_name || '';

                isAdmin = user.role === 'admin';

                if (isAdmin) {
                    document.getElementById('nav-users').classList.remove('hidden');
                } else {
                    document.getElementById('passwordForm').classList.remove('hidden');
                }

                localStorage.setItem('user_id', user.id);
                localStorage.setItem('role', user.role);

                loadingDiv.style.display = 'none';
                formContainer.style.display = 'block';
            } else {
                loadingDiv.innerHTML = '<p style="color:var(--rojo)">Error al cargar perfil</p>';
            }
        } catch (error) {
            loadingDiv.innerHTML = '<p style="color:var(--rojo)">Error de conexión</p>';
        }
    }

    document.getElementById('profileForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const full_name = document.getElementById('full_name').value;
        const userId = localStorage.getItem('user_id');

        try {
            const response = await fetch(`/users/${userId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ email, full_name })
            });

            const data = await response.json();

            if (response.ok) {
                toast('Perfil actualizado correctamente', 'success');
            } else {
                toast(data.detail || 'Error al actualizar perfil', 'error');
            }
        } catch (error) {
            toast('Error de conexión', 'error');
        }
    });

    document.getElementById('passwordForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        if (isAdmin) {
            toast('Los administradores deben cambiar contraseñas desde Gestionar Usuarios', 'error');
            return;
        }

        const current_password = document.getElementById('current_password').value;
        const new_password = document.getElementById('new_password').value;
        const confirm_password = document.getElementById('confirm_password').value;
        const userId = localStorage.getItem('user_id');
        const username = document.getElementById('user-username').textContent;

        if (!current_password) {
            toast('Debes ingresar tu contraseña actual', 'error');
            return;
        }
        if (new_password.length < 6) {
            toast('La nueva contraseña debe tener al menos 6 caracteres', 'error');
            return;
        }
        if (new_password !== confirm_password) {
            toast('Las contraseñas nuevas no coinciden', 'error');
            return;
        }

        try {
            const verifyResponse = await fetch('/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(current_password)}`
            });

            if (!verifyResponse.ok) {
                toast('La contraseña actual es incorrecta', 'error');
                return;
            }

            const response = await fetch(`/users/${userId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ password: new_password })
            });

            const data = await response.json();

            if (response.ok) {
                toast('Contraseña cambiada correctamente', 'success');
                document.getElementById('current_password').value = '';
                document.getElementById('new_password').value = '';
                document.getElementById('confirm_password').value = '';
            } else {
                toast(data.detail || 'Error al cambiar contraseña', 'error');
            }
        } catch (error) {
            toast('Error de conexión', 'error');
        }
    });

    loadProfile();
</script>
</body>
</html>
