<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario - Sistema HORECA</title>
    <link rel="stylesheet" href="/static/sistema_usuarios_shared.css">
</head>
<body>
    <nav class="navbar">
      <div class="navbar-brand">
        <h1>Gestión Facturas</h1>
        <span>& Albaranes</span>
      </div>
      <div class="navbar-links">
        <a href="/dashboard">Dashboard</a>
        <button id="nav-users" class="hidden" onclick="window.location.href='/users'">Usuarios</button>
        <a href="/profile">Mi perfil</a>
        <button onclick="localStorage.removeItem('token'); window.location.href='/login'">Salir</button>
      </div>
    </nav>

    <div class="container">
        <div id="access-denied" class="access-denied" style="display: none;">
            <h2>⛔ Acceso Denegado</h2>
            <p>No tienes permiso para acceder a esta página.</p>
            <button onclick="window.location.href='/dashboard'" class="btn">Volver al Dashboard</button>
        </div>

        <div id="content" class="card" style="display: none;">
            <h2>➕ Crear Nuevo Usuario</h2>

            <div id="alert-success" class="alert alert-success"></div>
            <div id="alert-error" class="alert alert-error"></div>

            <form id="createUserForm">
                <div class="form-group">
                    <label class="form-label" for="username">Nombre de Usuario *</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="ej: jperez">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email *</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="ej: jperez@empresa.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="full_name">Nombre Completo</label>
                    <input type="text" class="form-control" id="full_name" name="full_name" placeholder="ej: Juan Pérez García">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña *</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="Mínimo 6 caracteres">
                </div>

                <div class="form-group">
                    <label class="form-label" for="role_id">Rol *</label>
                    <select class="form-control" id="role_id" name="role_id" required>
                        <option value="1">Administrador</option>
                        <option value="2">Usuario Avanzado</option>
                        <option value="3" selected>Usuario Básico</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Crear Usuario</button>
                <button type="button" onclick="window.location.href='/users'" class="btn btn-outline btn-full" style="margin-top:10px">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');

        if (!token) window.location.href = '/login';

        async function checkRole() {
            try {
                const response = await fetch('/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const user = await response.json();
                    localStorage.setItem('user_id', user.id);
                    localStorage.setItem('role', user.role);

                    if (user.role === 'admin') {
                        document.getElementById('nav-users').classList.remove('hidden');
                    }

                    if (user.role !== 'admin') {
                        document.getElementById('content').style.display = 'none';
                        document.getElementById('access-denied').style.display = 'block';
                        return false;
                    }

                    document.getElementById('content').style.display = 'block';
                    return true;
                } else {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                    return false;
                }
            } catch (error) {
                console.error('Error:', error);
                return false;
            }
        }

        document.getElementById('createUserForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const full_name = document.getElementById('full_name').value;
            const password = document.getElementById('password').value;
            const role_id = parseInt(document.getElementById('role_id').value);

            const successDiv = document.getElementById('alert-success');
            const errorDiv = document.getElementById('alert-error');

            successDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/admin/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, email, full_name, password, role_id, is_active: true })
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = 'Usuario creado exitosamente';
                    successDiv.style.display = 'block';
                    document.getElementById('createUserForm').reset();
                } else {
                    errorDiv.textContent = data.detail || 'Error al crear usuario';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.style.display = 'block';
            }
        });

        checkRole();
    </script>
</body>
</html>
