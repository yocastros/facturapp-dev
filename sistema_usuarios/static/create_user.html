<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario — Gestión Facturas y Albaranes</title>
    <link rel="stylesheet" href="/static/sistema_usuarios_shared.css">
</head>
<body>
<script>(function(){var p=new URLSearchParams(window.location.search),t=p.get('tema')||localStorage.getItem('fa_tema')||'gris';if(p.get('tema'))localStorage.setItem('fa_tema',t);document.body.setAttribute('data-theme',t);})();</script>

<nav class="navbar">
  <div class="navbar-brand">
    <div class="navbar-logo-mark">F&amp;A</div>
    <div>
      <h1>Facturas <em>&amp;</em> Albaranes</h1>
      <span>Sistema de Gestión</span>
    </div>
  </div>
  <div class="navbar-links">
    <a href="http://localhost:5000">Dashboard</a>
    <button id="nav-users" class="hidden" onclick="window.location.href='/users'">Usuarios</button>
    <a href="/profile">Mi perfil</a>
    <button onclick="localStorage.removeItem('token'); window.location.href='/login'">Salir</button>
  </div>
</nav>

<div class="page-wrapper">

    <!-- Acceso denegado -->
    <div id="access-denied" style="display:none; text-align:center; padding:60px 24px;">
        <div style="font-size:48px; margin-bottom:16px;">⛔</div>
        <h2 style="font-family:'Playfair Display',serif; color:var(--azul); margin-bottom:8px;">Acceso Denegado</h2>
        <p style="color:var(--gris-m); margin-bottom:24px;">No tienes permiso para acceder a esta página.</p>
        <button onclick="window.location.href='http://localhost:5000'" class="btn btn-primary">Volver al Dashboard</button>
    </div>

    <!-- Contenido principal -->
    <div id="content" style="display:none;">
        <div class="page-header">
            <div>
                <h2>Crear Nuevo Usuario</h2>
                <p>Añade un nuevo acceso al sistema</p>
            </div>
            <button onclick="window.location.href='/users'" class="btn btn-outline">← Volver</button>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">Datos del usuario</span>
            </div>

            <div style="padding:24px;">
                <form id="createUserForm">
                    <div class="form-group">
                        <label class="form-label" for="username">Nombre de Usuario *</label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="ej: jperez">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email *</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="ej: jperez@empresa.com">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="full_name">Nombre Completo</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" placeholder="ej: Juan Pérez García">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Contraseña *</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Mínimo 6 caracteres">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="role_id">Rol *</label>
                        <select class="form-control" id="role_id" name="role_id" required>
                            <option value="1">Administrador</option>
                            <option value="2">Usuario Avanzado</option>
                            <option value="3" selected>Usuario Básico</option>
                        </select>
                    </div>

                    <div style="display:flex; gap:10px; margin-top:8px;">
                        <button type="submit" class="btn btn-primary">Crear Usuario</button>
                        <button type="button" onclick="window.location.href='/users'" class="btn btn-outline">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    function toast(msg, tipo = 'info') {
        const c = document.getElementById('toasts');
        const t = document.createElement('div');
        t.className = `toast toast-${tipo}`;
        t.innerHTML = `<span>${tipo==='success'?'✓':tipo==='error'?'✗':'ℹ'}</span><span>${msg}</span>`;
        c.appendChild(t);
        setTimeout(() => { t.style.animation='fadeOut .3s ease forwards'; setTimeout(()=>t.remove(),300); }, 4000);
    }

    async function checkRole() {
        try {
            const response = await fetch('/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const user = await response.json();
                localStorage.setItem('user_id', user.id);
                localStorage.setItem('role', user.role);
                if (user.role === 'admin') {
                    document.getElementById('nav-users').classList.remove('hidden');
                }
                if (user.role !== 'admin') {
                    document.getElementById('content').style.display = 'none';
                    document.getElementById('access-denied').style.display = 'block';
                    return false;
                }
                document.getElementById('content').style.display = 'block';
                return true;
            } else {
                localStorage.removeItem('token');
                window.location.href = '/login';
                return false;
            }
        } catch (error) {
            console.error('Error:', error);
            return false;
        }
    }

    document.getElementById('createUserForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const full_name = document.getElementById('full_name').value;
        const password = document.getElementById('password').value;
        const role_id = parseInt(document.getElementById('role_id').value);

        try {
            const response = await fetch('/admin/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ username, email, full_name, password, role_id, is_active: true })
            });

            const data = await response.json();

            if (response.ok) {
                toast('Usuario creado exitosamente', 'success');
                document.getElementById('createUserForm').reset();
            } else {
                toast(data.detail || 'Error al crear usuario', 'error');
            }
        } catch (error) {
            toast('Error de conexión', 'error');
        }
    });

    checkRole();
</script>
</body>
</html>
