<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — Gestión Facturas y Albaranes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/sistema_usuarios_shared.css">
<style>
body { background:var(--gris-f); display:flex; align-items:center; justify-content:center; min-height:100vh; }
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-box">
    <div class="login-logo">
      <span class="lock-icon">🔐</span>
      <h1>Gestión Facturas</h1>
      <span>& Albaranes</span>
    </div>

    <div id="alert-error" class="alert alert-error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <input type="text" class="form-control" id="username" name="username" required placeholder="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btn-login">Iniciar Sesión</button>
    </form>

    <div style="text-align:center;margin-top:18px;font-size:12px;color:var(--gris-m)">
      Acceso restringido al personal autorizado
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
function toast(msg, tipo='info') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast toast-${tipo}`;
  t.innerHTML = `<span>${tipo==='success'?'✓':tipo==='error'?'✗':'ℹ'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.style.animation='fadeOut .3s ease forwards'; setTimeout(()=>t.remove(),300); }, 4000);
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff"></span> Entrando...';
  const errEl = document.getElementById('alert-error');
  errEl.style.display = 'none';

  try {
    const fd = new FormData();
    fd.append('username', document.getElementById('username').value);
    fd.append('password', document.getElementById('password').value);
    const r = await fetch('/token', { method:'POST', body: fd });
    if (!r.ok) throw new Error('Credenciales incorrectas');
    const d = await r.json();
    localStorage.setItem('token', d.access_token);
    const params = new URLSearchParams(window.location.search);
    const next   = params.get('next') || '/';
    const sep    = next.includes('?') ? '&' : '?';
    window.location.href = next + sep + 'auth_token=' + d.access_token;
  } catch(err) {
    errEl.textContent = err.message || 'Usuario o contraseña incorrectos';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Iniciar Sesión';
  }
});
</script>
</body>
</html>
